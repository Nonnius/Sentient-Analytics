<html lang="en">

    <nav class="navbar navbar-expand-md my-1 m-4 p-1 fixed-top">
        <div class="container xxl text-white">
            <h6>My Degrees & Certifications</h6>



            <!--toggle button for mobile usage-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-nav"

                <span class="navbar-toggler-icon"></span>
            </button>


            <!--Navbar links-->
            <ul class="navbar-nav">
                <li class="nav-item">
                </li>

    <!--Carousel Code-->

        <div class="carousel-inner">
            <div class="carousel-item active">

                <img src="imgs/java.jpg" class="d-block w-100" alt="java">

            <div class="carousel-item">

            </div>

            </div>
            <div class="carousel-item">
                <img src="imgs/ProManagement1.jpg" class="d-block w-100" alt="ProManagement1">

            <div class="carousel-item">
                <img src="imgs/ProManagement2.jpg" class="d-block w-100" alt="ProManagement2">

            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselContent" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
